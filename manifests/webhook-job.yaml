apiVersion: batch/v1
kind: Job
metadata:
  name: fleet-success-callback
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  template:
    spec:
      containers:
      - name: curl-jenkins
        image: 10.200.170.11:5000/alpine:latest  # The new tiny image
        command:
        - /bin/sh
        - -c
        - "apk add --no-cache curl && curl -X POST http://jenkins.jenkins.svc.cluster.local:8080/generic-webhook-trigger/invoke?token=flightctl-deployed"
      restartPolicy: Never
