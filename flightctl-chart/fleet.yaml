defaultNamespace: flightctl-dev
targetCustomizations:
  # --- DEV ENVIRONMENT ---
  - name: dev-environment
    namespace: flightctl-dev
    clusterSelector:
      matchLabels:
        fleet.cattle.io/cluster: local
    helm:
      values:
        nodePorts:
          api: 30000
          cliArtifacts: 30010
          agent: 30020
          ui: 30030
          
  # --- QA ENVIRONMENT ---
  - name: qa-environment
    namespace: flightctl-qa
    clusterSelector:
      matchLabels:
        fleet.cattle.io/cluster: local
